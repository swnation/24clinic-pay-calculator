name: Deploy to GitHub Pages

# 앱은 Firebase Hosting(clinic-schedule-calc.firebaseapp.com)에서 서빙한다.
# Google 로그인이 인증 도메인과 같은 출처에서만 안정적으로 동작하기 때문.
# GitHub Pages(기존 북마크 주소)는 firebaseapp.com 으로 리다이렉트만 한다.

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate redirect page to Firebase Hosting
        run: |
          mkdir -p _site
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="ko">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>24시 열린의원 급여 계산기</title>
              <meta http-equiv="refresh" content="0; url=https://clinic-schedule-calc.firebaseapp.com/" />
              <script>location.replace("https://clinic-schedule-calc.firebaseapp.com/");</script>
            </head>
            <body>
              <p>새 주소로 이동합니다…
                <a href="https://clinic-schedule-calc.firebaseapp.com/">열리지 않으면 여기를 누르세요</a>
              </p>
            </body>
          </html>
          HTML
          cp _site/index.html _site/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
